name: Weekly Validation

# Catches drift from the outside world: upstream image tags, plugin
# versions, and third-party links that break without any commit here.

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  weekly-smoke:
    name: Full lab and toolchain validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COMPOSE_FILE: 00-local-lab-setup/docker-compose.yml
      TF_DIR: 02-installation/aws-ec2-single-instance/terraform
      PROJECT_DIR: 15-real-world-projects/01-python-flask-todo-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            15-real-world-projects/01-python-flask-todo-api/requirements.txt
            15-real-world-projects/01-python-flask-todo-api/requirements-dev.txt

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Prepare env
        run: cp 00-local-lab-setup/.env.example 00-local-lab-setup/.env

      - name: Terraform validation
        run: |
          terraform -chdir="${TF_DIR}" init -backend=false
          terraform -chdir="${TF_DIR}" validate

      - name: Python tests
        run: |
          python -m pip install --upgrade pip
          pip install -r "${PROJECT_DIR}/requirements.txt" \
                      -r "${PROJECT_DIR}/requirements-dev.txt"
          pytest "${PROJECT_DIR}/tests"

      - name: Local lab smoke test
        run: ./00-local-lab-setup/scripts/start-lab.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f "${COMPOSE_FILE}" logs --tail 200

      - name: Cleanup
        if: always()
        run: ./00-local-lab-setup/scripts/stop-lab.sh

name: Weekly Validation

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  weekly-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Prepare env
        run: cp 00-local-lab-setup/.env.example 00-local-lab-setup/.env

      - name: Terraform validation
        run: |
          terraform -chdir=02-installation/aws-ec2-single-instance/terraform init -backend=false
          terraform -chdir=02-installation/aws-ec2-single-instance/terraform validate

      - name: Python tests
        run: |
          python -m pip install --upgrade pip
          pip install -r 15-real-world-projects/01-python-flask-todo-api/requirements.txt \
                      -r 15-real-world-projects/01-python-flask-todo-api/requirements-dev.txt
          pytest 15-real-world-projects/01-python-flask-todo-api/tests

      - name: Local lab smoke test
        run: |
          chmod +x 00-local-lab-setup/scripts/*.sh
          ./00-local-lab-setup/scripts/start-lab.sh
          curl -fsS http://127.0.0.1:8080/login >/dev/null
          curl -fsS http://127.0.0.1:3000/ >/dev/null
          curl -fsS http://127.0.0.1:5000/v2/ >/dev/null

      - name: Cleanup
        if: always()
        run: ./00-local-lab-setup/scripts/stop-lab.sh

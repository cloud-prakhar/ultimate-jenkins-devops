services:
  jenkins:
    build:
      context: ./jenkins
    container_name: ${COMPOSE_PROJECT_NAME:-ultimate-jenkins-devops}-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD}
      JENKINS_AGENT_NAME: ${JENKINS_AGENT_NAME}
      JENKINS_AGENT_EXECUTORS: ${JENKINS_AGENT_EXECUTORS}
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - lab-network

  agent:
    build:
      context: ./agent
    container_name: ${COMPOSE_PROJECT_NAME:-ultimate-jenkins-devops}-agent
    restart: unless-stopped
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_WEB_SOCKET: "true"
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      AGENT_NAME: ${JENKINS_AGENT_NAME}
      AGENT_WORKDIR: /home/jenkins/agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-workdir:/home/jenkins/agent
    depends_on:
      jenkins:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'agent.jar|remoting.jar' >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lab-network

  gitea:
    image: gitea/gitea:1.22.6
    container_name: ${COMPOSE_PROJECT_NAME:-ultimate-jenkins-devops}-gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__DOMAIN: localhost
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__server__HTTP_PORT: 3000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - lab-network

  registry:
    image: registry:2.8.3
    container_name: ${COMPOSE_PROJECT_NAME:-ultimate-jenkins-devops}-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/v2/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lab-network

volumes:
  jenkins-data:
  gitea-data:
  registry-data:
  agent-workdir:

networks:
  lab-network:
    driver: bridge

jenkins:
  systemMessage: |
    Jenkins local learning lab.
    Controller executors are disabled by design.
    Run builds on the attached linux agent, not on the controller.
  numExecutors: 0
  mode: EXCLUSIVE
  labelString: "controller"
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          name: "Local Jenkins Admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  remotingSecurity:
    enabled: true
  nodes:
    - permanent:
        name: "${JENKINS_AGENT_NAME}"
        remoteFS: "/home/jenkins/agent"
        labelString: "linux docker"
        mode: EXCLUSIVE
        numExecutors: ${JENKINS_AGENT_EXECUTORS}
        launcher:
          inbound:
            webSocket: true
            workDirSettings:
              disabled: false
              internalDir: "remoting"
              failIfWorkDirIsMissing: false
        retentionStrategy: "always"
        nodeDescription: "Local Docker-based Linux build agent"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "gitea-credentials"
              description: "Local Gitea credentials"
              scope: GLOBAL
              username: "${GITEA_ADMIN_USER}"
              password: "${GITEA_ADMIN_PASSWORD}"
          - usernamePassword:
              id: "registry-credentials"
              description: "Local registry placeholder credentials"
              scope: GLOBAL
              username: "local-registry"
              password: "local-registry-not-used"

unclassified:
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@lab.local"
  giteaServers:
    servers:
      - displayName: "Local Gitea"
        serverUrl: "http://gitea:3000"
        manageHooks: true
        credentialsId: "gitea-credentials"

services:
  flask-todo-api:
    build: .
    image: flask-todo-api:local
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

[flake8]
# Match black's line length so they never conflict with each other
max-line-length = 120
exclude =
    .git,
    __pycache__,
    .pytest_cache,
    venv,
    .venv
# Allow `assert` statements in tests (bandit S101 would flag these)
per-file-ignores =
    tests/*: S101

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Treat every warning as an error so they don't accumulate silently
filterwarnings = error
